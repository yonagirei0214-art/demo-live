<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎰 ガチャを引く</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
:root{
  --bg:#08001a;--gold:#FFD700;--pink:#FF3AFF;--cyan:#00E5FF;--green:#00FF88;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:var(--bg);color:#fff;
  font-family:'Noto Sans JP',sans-serif;
  background-image:
    radial-gradient(ellipse at 50% 0%,rgba(100,0,180,0.5) 0%,transparent 60%),
    radial-gradient(ellipse at 20% 100%,rgba(0,80,200,0.3) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(180,0,100,0.2) 0%,transparent 50%);
}

/* ===== BG CANVAS ===== */
#starCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#particleCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:90;}
#flashEl{position:fixed;inset:0;pointer-events:none;z-index:89;opacity:0;transition:opacity 0.4s;}
.scan-line{position:fixed;left:0;width:100%;height:3px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent);
  pointer-events:none;z-index:95;opacity:0;}
.scan-line.go{animation:scanDown 0.5s ease-out forwards;}
@keyframes scanDown{from{top:0;opacity:1}to{top:100%;opacity:0}}

/* ===== SCREENS ===== */
.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(16px,5vw,32px);z-index:10;
  transition:opacity 0.35s ease;
}
.screen.hidden{opacity:0;pointer-events:none;}

/* LOGO */
.logo{
  font-family:'Zen Dots',monospace;
  font-size:clamp(28px,8vw,48px);
  text-align:center;margin-bottom:6px;
  background:linear-gradient(90deg,var(--gold),var(--pink),var(--cyan),var(--gold));
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.logo-sub{font-size:clamp(10px,2.5vw,13px);color:rgba(255,255,255,0.35);text-align:center;
  letter-spacing:0.2em;margin-bottom:clamp(20px,5vw,36px);}

/* CONNECTING */
.conn-spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,0.1);
  border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.conn-text{font-size:14px;color:rgba(255,255,255,0.45);text-align:center;font-family:'Zen Dots',monospace;}

/* PANEL */
.panel{
  background:rgba(12,0,28,0.88);
  border:1px solid rgba(120,0,200,0.45);
  border-radius:20px;padding:clamp(20px,5vw,32px);
  width:100%;max-width:400px;
  box-shadow:0 0 40px rgba(100,0,200,0.3),inset 0 0 20px rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
}
.panel-title{font-family:'Zen Dots',monospace;font-size:15px;text-align:center;color:var(--cyan);margin-bottom:18px;}
.name-input{
  width:100%;padding:14px 16px;
  background:rgba(0,0,0,0.5);border:1px solid rgba(120,0,200,0.5);
  border-radius:12px;color:#fff;font-size:16px;
  font-family:'Noto Sans JP',sans-serif;outline:none;text-align:center;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.name-input:focus{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,229,255,0.3);}
.submit-btn{
  width:100%;margin-top:14px;padding:14px;
  background:linear-gradient(135deg,#7000ff,#0088ff);
  border:none;border-radius:12px;
  font-family:'Zen Dots',monospace;font-size:14px;color:#fff;cursor:pointer;
  box-shadow:0 4px 20px rgba(112,0,255,0.5);transition:all 0.15s;
}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(112,0,255,0.7);}
.submit-btn:active{transform:scale(0.98);}
.error-box{background:rgba(255,50,80,0.15);border:1px solid rgba(255,50,80,0.4);
  border-radius:10px;padding:12px 16px;text-align:center;font-size:13px;color:#ff8090;margin-top:10px;}

/* ===== GACHA SCREEN ===== */
#screen-gacha{justify-content:flex-start;padding:0;}
.gacha-wrap{width:100%;height:100%;display:flex;flex-direction:column;}

.gacha-header{
  padding:clamp(10px,3vw,16px) clamp(16px,4vw,24px);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.45);border-bottom:1px solid rgba(100,0,180,0.35);
  flex-shrink:0;gap:12px;
}
.g-name{font-size:clamp(12px,3.5vw,14px);color:rgba(255,255,255,0.5);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.g-name span{color:#fff;font-weight:700;}
.spins-info{display:flex;align-items:baseline;gap:5px;flex-shrink:0;}
.spins-label{font-size:clamp(10px,2.5vw,12px);color:rgba(255,255,255,0.4);font-family:'Zen Dots',monospace;}
.spins-num{font-family:'Zen Dots',monospace;font-size:clamp(22px,6vw,30px);color:var(--cyan);
  text-shadow:0 0 16px var(--cyan);line-height:1;}

.gacha-body{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:clamp(16px,4vw,24px);gap:clamp(16px,4vw,24px);overflow:hidden;position:relative;
}

/* MACHINE */
.machine-orb{
  position:relative;
  width:clamp(140px,38vmin,180px);
  height:clamp(140px,38vmin,180px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(160,0,255,0.65),rgba(40,0,90,0.95));
  border:3px solid transparent;
  background-clip:padding-box;
  box-shadow:0 0 40px rgba(160,0,255,0.5),0 0 80px rgba(160,0,255,0.2),inset 0 0 40px rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;
  animation:orbFloat 3s ease-in-out infinite;
  overflow:hidden;
}
.machine-orb::before{content:'';position:absolute;inset:0;border-radius:50%;
  border:3px solid transparent;
  background:linear-gradient(135deg,var(--gold),var(--pink),var(--cyan),var(--gold)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;}
.machine-orb::after{content:'';position:absolute;width:200%;height:200%;
  background:conic-gradient(from 0deg,transparent,rgba(255,215,0,0.12) 20%,transparent 40%);
  animation:orbRing 4s linear infinite;}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes orbRing{to{transform:rotate(360deg)}}
.machine-emoji{font-size:clamp(52px,15vmin,72px);z-index:1;animation:emojiPulse 2.5s ease-in-out infinite;}
@keyframes emojiPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* GACHA BTN */
.gacha-btn{
  background:linear-gradient(135deg,#9400ff,#ff00aa,#ff8c00);
  border:none;border-radius:50px;
  padding:clamp(14px,4vmin,18px) clamp(40px,10vw,64px);
  font-family:'Zen Dots',monospace;
  font-size:clamp(15px,4.5vmin,20px);
  color:#fff;cursor:pointer;
  box-shadow:0 6px 30px rgba(148,0,255,0.6),0 0 60px rgba(255,0,170,0.25);
  transition:all 0.15s;position:relative;overflow:hidden;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
  -webkit-tap-highlight-color:transparent;
  min-width:clamp(180px,50vw,240px);
}
.gacha-btn::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,0.12) 50%,transparent 70%);
  animation:btnShine 2.5s linear infinite;}
@keyframes btnShine{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
.gacha-btn:hover{transform:scale(1.04);}
.gacha-btn:active{transform:scale(0.97);}
.gacha-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.cost-hint{font-size:clamp(10px,2.5vmin,13px);color:rgba(255,255,255,0.3);
  font-family:'Zen Dots',monospace;text-align:center;}

/* ===== OVERLAY ===== */
#overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.88);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
  padding:clamp(16px,5vw,32px);overflow-y:auto;gap:clamp(10px,3vmin,18px);
}
#overlay.show{opacity:1;pointer-events:auto;}

/* CARD */
.card-scene{
  width:clamp(170px,46vmin,220px);
  height:clamp(238px,64vmin,308px);
  perspective:1000px;flex-shrink:0;
}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0s;}
.card-inner.flip{transition:transform 0.72s cubic-bezier(0.4,0.2,0.2,1);transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;overflow:hidden;}

/* 裏面 */
.card-back{
  background:radial-gradient(ellipse at 40% 30%,#3d0080,#0d001a);
  border:2px solid rgba(120,0,220,0.8);
  box-shadow:0 0 30px rgba(100,0,200,0.5),0 0 60px rgba(100,0,200,0.15);
}
.card-back-pattern{
  width:80%;height:80%;border:1px solid rgba(255,215,0,0.2);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(100,0,200,0.1) 8px,rgba(100,0,200,0.1) 9px);
}
.card-question{font-size:clamp(48px,14vmin,64px);animation:qFloat 1s ease-in-out infinite alternate;}
@keyframes qFloat{from{transform:translateY(-4px)}to{transform:translateY(4px)}}

/* 表面（動的スタイルはJS側で設定） */
.card-front{
  transform:rotateY(180deg);
  background:linear-gradient(135deg,rgba(18,0,36,0.97),rgba(8,0,18,0.97));
  border:3px solid rgba(255,255,255,0.3);
  flex-direction:column;gap:6px;
}
.card-rarity-label{
  font-family:'Zen Dots',monospace;font-size:clamp(11px,3vmin,14px);
  padding:3px 14px;border-radius:6px;letter-spacing:0.1em;
  color:#fff;white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis;
}
.card-prize-emoji{font-size:clamp(36px,10vmin,52px);}
.card-prize-name{
  font-size:clamp(12px,3.5vmin,15px);font-weight:700;text-align:center;
  color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.4);line-height:1.4;
  max-width:100%;overflow:hidden;
}
.card-prize-text{
  font-size:clamp(10px,2.8vmin,13px);text-align:center;color:rgba(255,255,255,0.65);
  line-height:1.5;max-width:100%;word-break:break-word;
  border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;margin-top:2px;
  display:none;
}

/* SHAKE */
@keyframes shake{
  0%,100%{transform:translateX(0) rotate(0)}
  10%{transform:translateX(-6px) rotate(-2deg)}
  25%{transform:translateX(7px) rotate(2.5deg)}
  40%{transform:translateX(-7px) rotate(-2.5deg)}
  55%{transform:translateX(6px) rotate(2deg)}
  70%{transform:translateX(-4px) rotate(-1deg)}
  85%{transform:translateX(3px) rotate(0.5deg)}
}
.shaking{animation:shake 0.85s ease-in-out;}

/* RESULT LABEL */
.result-label{
  font-family:'Zen Dots',monospace;
  font-size:clamp(16px,5vmin,22px);
  text-align:center;opacity:0;transition:opacity 0.5s;
  min-height:1.3em;
}
.result-label.show{opacity:1;}

/* DL + AGAIN */
.dl-btn{
  background:linear-gradient(135deg,#00cc66,#0066ff);border:none;
  border-radius:50px;padding:clamp(13px,3.5vmin,16px) clamp(28px,8vw,44px);
  font-family:'Zen Dots',monospace;font-size:clamp(13px,3.5vmin,15px);
  color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,100,0.5);
  transition:all 0.2s;opacity:0;pointer-events:none;
  min-width:clamp(180px,50vw,220px);
}
.dl-btn.ready{opacity:1;pointer-events:auto;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.dl-btn:hover{transform:scale(1.04);}
.dl-btn:active{transform:scale(0.97);}
.again-btn{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);
  border-radius:50px;padding:clamp(10px,3vmin,13px) clamp(24px,7vw,36px);
  font-family:'Zen Dots',monospace;font-size:clamp(11px,3vmin,13px);
  color:rgba(255,255,255,0.55);cursor:pointer;transition:all 0.2s;
  opacity:0;pointer-events:none;
}
.again-btn.ready{opacity:1;pointer-events:auto;animation:popIn 0.4s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;}
.again-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}

/* ZERO SPINS */
.zero-spins-msg{
  text-align:center;color:rgba(255,255,255,0.4);
  font-size:clamp(12px,3vw,14px);margin-top:8px;
}

/* PC LAYOUT */
@media(min-width:768px){
  .gacha-body{flex-direction:row;justify-content:center;align-items:center;gap:clamp(40px,6vw,80px);}
  .gacha-machine-col{display:flex;flex-direction:column;align-items:center;gap:24px;}
  #overlay{flex-direction:row;align-items:center;justify-content:center;gap:40px;}
  .overlay-info{display:flex;flex-direction:column;align-items:flex-start;gap:16px;max-width:280px;}
}
@media(max-width:767px){
  .overlay-info{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
}

.hidden{display:none!important;}
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<canvas id="particleCanvas"></canvas>
<div id="flashEl"></div>
<div class="scan-line" id="scanLine"></div>

<!-- ===== OVERLAY: 演出 ===== -->
<div id="overlay">
  <div class="card-scene">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-back">
        <div class="card-back-pattern"><div class="card-question">❓</div></div>
      </div>
      <div class="card-face card-front" id="cardFront">
        <span class="card-rarity-label" id="cardRarityLabel"></span>
        <div class="card-prize-emoji" id="cardEmoji">🎁</div>
        <div class="card-prize-name" id="cardPrizeName"></div>
        <div class="card-prize-text" id="cardPrizeText"></div>
      </div>
    </div>
  </div>
  <div class="overlay-info">
    <div class="result-label" id="resultLabel"></div>
    <button class="dl-btn" id="dlBtn">⬇ 景品をダウンロード</button>
    <button class="again-btn" id="againBtn" onclick="closeOverlay()">もう一度引く →</button>
  </div>
</div>

<!-- ===== SCREEN: 接続中 ===== -->
<div class="screen" id="screen-connecting">
  <div class="logo">GACHA</div>
  <div class="logo-sub">POWERED BY P2P</div>
  <div class="conn-spinner"></div>
  <div class="conn-text" id="connText">ルームに接続中...</div>
</div>

<!-- ===== SCREEN: 名前入力 ===== -->
<div class="screen hidden" id="screen-name">
  <div class="logo">GACHA</div>
  <div class="logo-sub">あなたの名前を入力</div>
  <div class="panel">
    <div class="panel-title">👤 リスナー名</div>
    <input class="name-input" type="text" id="nameInput" placeholder="配信で使っている名前" autocomplete="off" maxlength="30">
    <div id="nameError"></div>
    <button class="submit-btn" onclick="submitName()">接続する</button>
  </div>
</div>

<!-- ===== SCREEN: ガチャ本体 ===== -->
<div class="screen hidden" id="screen-gacha">
  <div class="gacha-wrap">
    <div class="gacha-header">
      <div class="g-name">こんにちは、<span id="playerName">-</span></div>
      <div class="spins-info">
        <span class="spins-label">残り</span>
        <span class="spins-num" id="spinsNum">0</span>
        <span class="spins-label">回</span>
      </div>
    </div>
    <div class="gacha-body">
      <!-- PC: 左カラム / SP: 縦並び -->
      <div class="gacha-machine-col">
        <div class="machine-orb"><div class="machine-emoji">🎰</div></div>
        <button class="gacha-btn" id="gachaBtn" onclick="spin()">GACHA !</button>
        <div class="cost-hint" id="costHint"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ===== STARS ===== */
(()=>{
  const c=document.getElementById('starCanvas'),ctx=c.getContext('2d');
  let stars=[];
  const resize=()=>{c.width=innerWidth;c.height=innerHeight;
    stars=Array.from({length:110},()=>({x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*1.4+0.3,op:Math.random(),spd:Math.random()*0.006+0.002}));};
  const draw=()=>{ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{s.op=Math.max(0.05,Math.min(0.95,s.op+(Math.random()>0.5?s.spd:-s.spd)));
      ctx.globalAlpha=s.op;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
    requestAnimationFrame(draw);};
  window.addEventListener('resize',resize);resize();draw();
})();

/* ===== PARTICLES ===== */
const pCanvas=document.getElementById('particleCanvas');
const pCtx=pCanvas.getContext('2d');
const resizePCanvas=()=>{pCanvas.width=innerWidth;pCanvas.height=innerHeight;};
window.addEventListener('resize',resizePCanvas);resizePCanvas();
let particles=[];

function spawnParticles(x,y,color,count){
  const palette=[color,lightenColor(color,60),'#ffffff',lightenColor(color,30)];
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,spd=Math.random()*11+3;
    particles.push({
      x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-5,
      color:palette[Math.floor(Math.random()*palette.length)],
      life:1,decay:Math.random()*0.018+0.01,
      size:Math.random()*8+2,star:Math.random()>0.5
    });
  }
}

function lightenColor(hex,amount){
  const n=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,((n>>16)&0xff)+amount);
  const g=Math.min(255,((n>>8)&0xff)+amount);
  const b=Math.min(255,(n&0xff)+amount);
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

(function animP(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.38;p.vx*=0.97;p.life-=p.decay;
    pCtx.globalAlpha=Math.max(0,p.life);pCtx.fillStyle=p.color;
    if(p.star){
      pCtx.save();pCtx.translate(p.x,p.y);pCtx.rotate(Date.now()*0.003);
      pCtx.beginPath();
      for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5,b=a+Math.PI/5,r=p.size*p.life;
        i===0?pCtx.moveTo(Math.cos(a)*r,Math.sin(a)*r):pCtx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
        pCtx.lineTo(Math.cos(b)*(r*0.4),Math.sin(b)*(r*0.4));}
      pCtx.closePath();pCtx.fill();pCtx.restore();
    }else{pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);pCtx.fill();}
  });
  requestAnimationFrame(animP);
})();

/* ===== AUDIO ===== */
function playSound(win){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=win?[523,659,784,1047,1319]:[330,294];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      const t=ctx.currentTime+i*0.1;
      g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      o.start(t);o.stop(t+0.8);
    });
  }catch(e){}
}

/* ===== STATE ===== */
const st={
  peer:null,conn:null,name:null,remainingSpins:0,costPerSpin:0,
  spinning:false,animDone:false,fileDone:false,
  dlUrl:null,dlName:null,
  chunks:[],totalChunks:0,dlMime:'application/octet-stream',
  pendingHasFile:false
};

/* ===== CONNECTION ===== */
const params=new URLSearchParams(location.search);
const roomId=params.get('room');

window.onload=()=>{
  if(!roomId){showError('URLにルームIDがありません。\nライバーから受け取ったURLを開いてください。');return;}
  connect();
};

function connect(){
  setConnText('ルームに接続中...');
  st.peer=new Peer({debug:0});
  st.peer.on('open',()=>{
    setConnText('ホストに接続中...');
    st.conn=st.peer.connect(roomId,{reliable:true});
    st.conn.on('open',()=>{setConnText('接続完了！');showScreen('screen-name');});
    st.conn.on('data',onData);
    st.conn.on('close',()=>{if(!st.spinning)showError('ホストとの接続が切れました。\nライバーの配信を確認してください。');});
    st.conn.on('error',e=>showError('接続エラー: '+e.message));
    setTimeout(()=>{if(!st.conn?.open)showError('ホストに接続できませんでした。\nルームが開かれているか確認してください。');},12000);
  });
  st.peer.on('error',e=>{
    if(e.type==='peer-unavailable')showError('ルームが見つかりません。\nライバーが配信中か確認してください。');
    else showError('接続エラー: '+e.message);
  });
}

function onData(data){
  if(typeof data!=='object')return;
  switch(data.type){
    case 'welcome':
      st.remainingSpins=data.remainingSpins;st.costPerSpin=data.costPerSpin;
      document.getElementById('playerName').textContent=data.name||st.name;
      document.getElementById('spinsNum').textContent=st.remainingSpins;
      document.getElementById('costHint').textContent=data.costPerSpin+'Pt / 1回';
      showScreen('screen-gacha');
      break;
    case 'error':
      showScreen('screen-name');
      document.getElementById('nameError').innerHTML=`<div class="error-box">${data.message}</div>`;
      break;
    case 'spin_result':
      st.pendingHasFile=data.prize.hasFile;
      st.remainingSpins=data.remainingSpins;
      document.getElementById('spinsNum').textContent=st.remainingSpins;
      if(!data.prize.hasFile){st.fileDone=true;}
      showCardResult(data.rarity,data.prize);
      break;
    case 'spin_denied':
      st.spinning=false;setGachaBtn(true);break;
    case 'file_start':
      st.chunks=new Array(data.totalChunks);st.totalChunks=data.totalChunks;
      st.dlName=data.fileName;st.dlMime=data.mimeType||'application/octet-stream';break;
    case 'file_chunk':
      st.chunks[data.i]=data.d;break;
    case 'file_end':
      buildFile();break;
    case 'spins_update':
      st.remainingSpins=data.remainingSpins;
      document.getElementById('spinsNum').textContent=st.remainingSpins;break;
  }
}

/* ===== SPIN ===== */
function spin(){
  if(st.spinning||st.remainingSpins<=0)return;
  st.spinning=true;st.animDone=false;st.fileDone=false;st.dlUrl=null;
  setGachaBtn(false);
  st.conn.send({type:'spin_request'});
  showOverlay();
}

function setGachaBtn(enabled){
  const btn=document.getElementById('gachaBtn');
  btn.disabled=!enabled;
  if(!enabled){btn.textContent='引いています...';}
  else if(st.remainingSpins<=0){btn.textContent='終了';btn.disabled=true;}
  else{btn.textContent='GACHA !';}
}

/* ===== OVERLAY ===== */
function showOverlay(){
  const ov=document.getElementById('overlay');
  document.getElementById('dlBtn').className='dl-btn';
  document.getElementById('againBtn').className='again-btn';
  const rl=document.getElementById('resultLabel');rl.className='result-label';rl.textContent='';
  document.getElementById('cardInner').className='card-inner';
  const front=document.getElementById('cardFront');
  front.className='card-face card-front';
  front.style.border='3px solid rgba(255,255,255,0.3)';
  front.style.boxShadow='';
  document.getElementById('cardPrizeText').style.display='none';
  ov.classList.add('show');
}

function showCardResult(rarity,prize){
  const color=rarity.color||'#9900ff';
  const scene=document.getElementById('cardScene')||document.querySelector('.card-scene');

  // SHAKE
  const inner=document.getElementById('cardInner');
  inner.classList.remove('shaking');void inner.offsetWidth;inner.classList.add('shaking');

  setTimeout(()=>{
    inner.classList.remove('shaking');

    // カード表面スタイル（カスタムカラー）
    const front=document.getElementById('cardFront');
    front.style.border=`3px solid ${color}`;
    front.style.boxShadow=`0 0 30px ${color}aa,0 0 60px ${color}44`;

    // レアリティラベル
    const lbl=document.getElementById('cardRarityLabel');
    lbl.textContent=rarity.name;
    lbl.style.background=color;
    lbl.style.boxShadow=`0 0 12px ${color}88`;

    // 景品情報
    document.getElementById('cardEmoji').textContent=prize.hasFile?'📦':'💌';
    document.getElementById('cardPrizeName').textContent=prize.name;

    const textEl=document.getElementById('cardPrizeText');
    if(prize.text){textEl.textContent=prize.text;textEl.style.display='block';}
    else{textEl.style.display='none';}

    // FLIP
    inner.classList.add('flip');

    setTimeout(()=>{
      playSound(true);
      flashEffect(color);

      // パーティクル
      const cx=innerWidth/2,cy=innerHeight/2;
      const count=Math.min(80,Math.max(20,40));
      spawnParticles(cx,cy,color,count);
      // スキャンライン
      const sl=document.getElementById('scanLine');
      sl.style.background=`linear-gradient(90deg,transparent,${color},transparent)`;
      sl.classList.remove('go');void sl.offsetWidth;sl.classList.add('go');

      // 結果テキスト
      const rl=document.getElementById('resultLabel');
      rl.textContent=`${rarity.name} 当選！`;
      rl.style.color=color;
      rl.style.textShadow=`0 0 20px ${color}`;
      rl.className='result-label show';

      st.animDone=true;tryShowDl();
    },760);
  },920);
}

function flashEffect(color){
  const el=document.getElementById('flashEl');
  el.style.background=color;el.style.opacity='0.5';
  setTimeout(()=>{el.style.opacity='0';},80);
}

function buildFile(){
  try{
    const b64=st.chunks.join('');
    const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    st.dlUrl=URL.createObjectURL(new Blob([bytes],{type:st.dlMime}));
    st.fileDone=true;tryShowDl();
  }catch(e){console.error('buildFile error:',e);}
}

function tryShowDl(){
  if(!st.animDone)return;
  if(st.pendingHasFile&&!st.fileDone)return;
  st.spinning=false;
  if(st.pendingHasFile&&st.dlUrl){
    const dlBtn=document.getElementById('dlBtn');
    dlBtn.className='dl-btn ready';
    dlBtn.onclick=downloadFile;
  }
  if(st.remainingSpins>0){document.getElementById('againBtn').className='again-btn ready';}
  setGachaBtn(true);
}

function downloadFile(){
  const a=document.createElement('a');
  a.href=st.dlUrl;a.download=st.dlName||'prize';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  st.spinning=false;setGachaBtn(true);
}

/* ===== NAV ===== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function setConnText(t){document.getElementById('connText').textContent=t;}

function showError(msg){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  const err=document.createElement('div');
  err.className='screen';
  err.style.zIndex='20';
  err.innerHTML=`
    <div class="logo" style="font-size:clamp(18px,5vw,24px);margin-bottom:20px;">接続エラー</div>
    <div class="panel">
      <div class="error-box" style="white-space:pre-line">${msg}</div>
      <button class="submit-btn" onclick="location.reload()" style="margin-top:14px;">再接続する</button>
    </div>`;
  document.body.appendChild(err);
}

function submitName(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name)return;
  st.name=name;document.getElementById('nameError').innerHTML='';
  if(st.conn?.open)st.conn.send({type:'identify',name});
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const s=document.getElementById('screen-name');
    if(!s.classList.contains('hidden'))submitName();
  }
});
</script>
</body>
</html>
